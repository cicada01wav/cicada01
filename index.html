  <style>

    html {
      scroll-behavior: smooth;

    body {
      margin: 0;
      background: black;
      color: white;
      transition:
        background 0.6s ease,
        color 0.6s ease,
        filter 0.6s ease;
      font-family: 'Great Vibes', cursive;
      overflow-x: hidden;
      position: relative;
      cursor: default;
    }

    #cursorGlow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(
          circle,
          rgba(255,255,255,0.055) 0%,
          rgba(255,255,255,0.02) 20%,
          rgba(255,255,255,0) 70%
        );
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear;
      mix-blend-mode: screen;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.055;
      background-image:
        url("https://www.transparenttextures.com/patterns/asfalt-light.png");
      animation: noiseMove 0.25s infinite;
    }

    @keyframes noiseMove {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-1%, 1%); }
      50% { transform: translate(1%, -1%); }
      75% { transform: translate(-1%, -1%); }
      100% { transform: translate(0, 0); }
    }

    body.inverted {
      background: white;
      color: black;
    }

    body.inverted section,
    body.inverted footer,
    body.inverted .section-title,
    body.inverted #timer,
    body.inverted #secretDiscord a {
      color: black !important;
    }

    body.inverted .card,
    body.inverted .poster-card {
      border: 1px solid rgba(0,0,0,0.18);
      background: #f2f2f2;
    }

    body.inverted .arrow {

    }

    body.inverted .arrow:hover {

    }

    body.inverted .logo,

      filter: invert(0);
    }

    #secretDiscord {
      position: fixed;
      bottom: 18px;
      left: 22px;
      z-index: 999999;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 2px;

      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.5s ease,
        transform 0.5s ease;
      transform: translateY(6px);
    }

    #secretDiscord a {
      color: rgba(255,255,255,0.42);
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    #secretDiscord a:hover {
      opacity: 1;
    }

    body.inverted #secretDiscord {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      opacity: 0.08;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.03) 0px,
          rgba(255,255,255,0.03) 1px,
          transparent 2px,
          transparent 4px
        );
      mix-blend-mode: soft-light;
    }

    .vignette {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 4;
      background:
        radial-gradient(
          circle,
          rgba(0,0,0,0) 38%,
          rgba(0,0,0,0.18) 68%,
          rgba(0,0,0,0.42) 100%
        );
      mix-blend-mode: multiply;
    }

    #intro {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: introFadeOut 1s ease forwards;
      animation-delay: 2s;
    }

    .intro-logo {
      width: 380px;
      filter: invert(1);
      opacity: 0;
      transform: scale(0.75);
      animation:
        logoAppear 1.6s ease forwards,
        logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoAppear {
      0% {
        opacity: 0;
        transform: scale(0.55);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes logoPulse {
      0% {
        filter: invert(1) drop-shadow(0 0 0px white);
      }
      50% {
        filter: invert(1) drop-shadow(0 0 18px white);
      }
      100% {
        filter: invert(1) drop-shadow(0 0 0px white);
      }
    }

    @keyframes introFadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    #siteContent {
      opacity: 0;
      animation: siteAppear 1s ease forwards;
      animation-delay: 2s;
      position: relative;
      z-index: 3;
    }

    @keyframes siteAppear {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .site-wrapper {
      transition:
        filter 0.55s ease,
        opacity 0.55s ease;
    }

    .site-wrapper.blur-active {
      filter:
        blur(14px)
        brightness(0.35);
    }

    section {
      padding: 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      transform: translateY(50px);
      transition:
        opacity 1.2s ease,
        transform 1.2s ease;
    }

    section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .hero {
      height: 45vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 9999;
      opacity: 1 !important;
      transform: none !important;
    }

    .logo {
      width: 320px;
      filter: invert(1);
      opacity: 0.92;
      cursor: pointer;
      position: relative;
      z-index: 10000;
      transition:
        transform 0.45s ease,
        filter 0.45s ease,
        opacity 0.45s ease;
    }

    .logo:hover {
      transform: scale(1.12);
      filter:
        invert(1)
        drop-shadow(0 0 12px rgba(255,255,255,0.75))
        drop-shadow(0 0 32px rgba(255,255,255,0.4));
      opacity: 1;
    }

    .logo.glitch {
      animation: glitchAnim 0.18s linear;
    }

    @keyframes glitchAnim {
      0% {
        transform: translate(0);
        filter:
          invert(1)
          drop-shadow(-4px 0 red)
          drop-shadow(4px 0 cyan);
      }
      25% {
        transform: translate(-2px, 1px);
      }
      50% {
        transform: translate(2px, -1px);
      }
      75% {
        transform: translate(-1px, -1px);
      }
      100% {
        transform: translate(0);
        filter:
          invert(1)
          drop-shadow(0 0 12px rgba(255,255,255,0.7));
      }
    }

    .section-title {
      width: 100%;
      text-align: left;
      font-size: 1.8rem;
      margin-bottom: 15px;
      opacity: 0.7;
      letter-spacing: 1px;
      padding-left: 60px;
    }

    .scroll-wrapper {
      position: relative;
      width: 100%;
    }

    .horizontal-scroll {

    .card {

    }

    #imageViewer.active #fullscreenImage {
      transform: scale(1);

    @media (max-width: 768px) {

          section.classList.add("visible");
